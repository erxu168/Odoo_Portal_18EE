<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Shift Report Popup</title>
    <!-- Use Bootstrap CSS as Odoo uses Bootstrap extensively -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa; /* Simulate a dim POS background */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* Simulating the Odoo POS Modal wrap */
        .pos-modal-backdrop {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .popup {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid #dee2e6;
            background-color: #ffffff;
        }

        .modal-title {
            margin: 0;
            font-weight: 600;
            color: #212529;
            font-size: 1.25rem;
        }

        .modal-body {
            padding: 1.5rem;
            color: #495057;
            max-height: 70vh;
            overflow-y: auto;
        }

        .modal-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid #dee2e6;
            background-color: #f8f9fa;
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
        }

        /* Odoo primary button color is usually a bit distinct, but we'll use BS primary */
        .form-label {
            font-weight: 500;
        }

        .btn-lg {
            padding: 0.5rem 1.5rem;
            font-size: 1rem;
        }
    </style>
</head>
<body>

<div class="pos-modal-backdrop">
    <!-- The structure mirroring the XML -->
    <div class="popup popup-textarea popup-shift-report">
        <div class="modal-header">
            <h4 class="modal-title">Shift Report</h4>
        </div>
        <main class="modal-body overflow-auto">
            <div class="d-flex flex-column gap-3 mb-4 mt-3">
                <p>Please fill out your shift report before closing the session.</p>

                <div class="form-group text-start">
                    <label class="form-label" for="shift_report_issues">Any issues during the shift? (Ops, customers, tech...)</label>
                    <textarea class="form-control"
                              id="shift_report_issues"
                              rows="3"
                              placeholder="Enter issues here..."></textarea>
                </div>

                <div class="form-group text-start form-check mt-2 mb-2">
                    <input class="form-check-input form-control-lg" type="checkbox" id="shift_report_cleaning" style="width: 1.5em; height: 1.5em; margin-top: 0.1em; cursor: pointer;">
                    <label class="form-check-label fs-5 ms-2" for="shift_report_cleaning" style="cursor: pointer; user-select: none;">
                        I have completed the cleaning &amp; closing checklist.
                    </label>
                </div>

                <div class="form-group text-start">
                    <label class="form-label" for="shift_report_notes">Other Notes</label>
                    <textarea class="form-control"
                              id="shift_report_notes"
                              rows="3"
                              placeholder="Enter any other notes..."></textarea>
                </div>
            </div>
        </main>
        <footer class="modal-footer justify-content-end">
            <button class="btn btn-primary btn-lg" onclick="alert('Confirm clicked')">Confirm</button>
            <button class="btn btn-secondary btn-lg" onclick="alert('Cancel clicked')">Cancel</button>
        </footer>
    </div>
</div>

</body>
</html>
