name: Build Cooking Timer APK

# Cloud-builds the "Cooking Timer" Android app (a Capacitor wrapper of
# https://portal.krawings.de/cooktimer — the KDS Cooking Timer station board). This
# is the OPEN variant: a normal app staff can leave (no kiosk lock-task). The finished
# .apk is published to a rolling GitHub release so any tablet can install it directly.
# No local Android Studio needed. See docs/android-cooktimer/README.md.

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    paths:
      - 'docs/android-cooktimer/**'
      - '.github/workflows/build-cooktimer.yml'
  push:
    branches: [ main ]
    paths:
      - 'docs/android-cooktimer/**'
      - '.github/workflows/build-cooktimer.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'   # Capacitor 8 CLI requires Node >= 22
          cache: 'npm'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK packages (Capacitor 8 targets SDK 36)
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install JS dependencies
        run: npm ci

      - name: Use the Cooking Timer Capacitor config
        # The repo root has capacitor.config.ts (the Portal app: appId de.krawings.portal).
        # Capacitor loads config .ts > .js > .json, so unless we remove the .ts our copied
        # .json is IGNORED. Remove it so the cooktimer .json is the config Capacitor uses.
        run: |
          rm -f capacitor.config.ts capacitor.config.js
          cp docs/android-cooktimer/capacitor.config.json ./capacitor.config.json

      - name: Provide a webDir (the app loads the live site via server.url)
        run: |
          mkdir -p www
          printf '' > www/index.html

      - name: Generate the native Android project
        run: npx cap add android

      # NOTE: no kiosk lock-task step here — this is the OPEN variant. (The Time Clock
      # app wires in native lock-task code; the Cooking Timer intentionally does not.)

      - name: Sync Capacitor into the native project
        run: npx cap sync android

      - name: Generate the app icon (legacy + adaptive)
        run: |
          set -e
          if ! command -v convert >/dev/null; then sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick; fi
          mkdir -p assets
          cp docs/android-cooktimer/assets/icon-only.png assets/icon-only.png
          # Modern Android launchers use the ADAPTIVE icon, which needs a foreground + a
          # background. With only icon-only.png, @capacitor/assets keeps Capacitor's DEFAULT
          # adaptive foreground (a generic blue mark) — so the launcher shows a default icon
          # even though the legacy icon is correct. Derive both adaptive layers from the same
          # art: the icon shrunk into the adaptive safe zone as the foreground, solid white
          # as the background (the icon already sits on white).
          convert docs/android-cooktimer/assets/icon-only.png -resize 66% -background none -gravity center -extent 1024x1024 assets/icon-foreground.png
          convert -size 1024x1024 xc:white assets/icon-background.png
          npx --yes @capacitor/assets generate --android

      - name: Build the debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload the APK as a build artifact
        uses: actions/upload-artifact@v4
        with:
          name: krawings-cooktimer-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish APK to the 'cooktimer-latest' release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk krawings-cooktimer.apk
          gh release delete cooktimer-latest --repo "${{ github.repository }}" --yes --cleanup-tag || true
          gh release create cooktimer-latest krawings-cooktimer.apk \
            --repo "${{ github.repository }}" \
            --title "Cooking Timer (latest build)" \
            --notes "Auto-built from ${{ github.sha }}. On the tablet: open this page, tap krawings-cooktimer.apk, and allow install from unknown sources. Currently points at STAGING (portal.krawings.de/cooktimer)."
