name: Portal Smoke Test

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Which site to test
        type: choice
        options:
          - staging
          - live
        default: staging

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      # Run the pure-function unit tests (always) + the login smoke (auto-skips
      # unless SMOKE_EMAIL/SMOKE_PASSWORD secrets are set). The heavier
      # login-based module e2e suites are run manually (npm run test:inventory).
      - name: Run smoke + unit tests
        run: npx playwright test --project=unit --project=smoke
        env:
          SMOKE_ENV: ${{ github.event.inputs.environment || 'staging' }}
          SMOKE_EMAIL: ${{ secrets.SMOKE_EMAIL }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
